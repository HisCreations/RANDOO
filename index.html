<title>Index</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f4f4;
}

h1 {
    margin-top: 30px;
}

.gallery {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    margin-top: 40px;
}

/* Video card */
.card {
    width: 250px;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0px 3px 10px rgba(0,0,0,0.2);
}

/* IMAGE SETTINGS */
.card img {
    width: 100%;
    height: 180px;
    object-fit: contain;   /* ⭐ prevents zoom/cropping */
    background-color: #ddd; /* fills empty space nicely */
    border-radius: 10px;
    transition: transform 0.3s;
}

.card img:hover {
    transform: scale(1.05);
}

.card h3 {
    margin: 10px 0 5px;
}

.card p {
    font-size: 14px;
    color: #555;
}
</style>
</head>
